<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .header {
            background: #4a90e2;
            color: #fff;
            padding: 10px;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }

        .content {
            padding: 20px;
        }

        .otp {
            font-size: 24px;
            font-weight: bold;
            color: #4a90e2;
            text-align: center;
            margin: 20px 0;
        }

        .footer {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body style="margin: 0; padding: 0; background-color: #f9f9f9; font-family: Arial, sans-serif;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%"
        style="padding-bottom: 30px;max-width: 600px; margin: 30px auto; background-color: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 8px;">
        <tr>
            <td align="center" style="padding: 30px 20px;">
                <img src="https://aarogyaabharat.com/storage/Brand/1753886850.png" alt="Sitemonitor" width="70"
                    height="70" style="border:1px solid black;border-radius: 100%;margin-bottom: 10px;" />
                <h2 style="font-size: 12px; color: #24292e; margin: 0;">If you did not request this, please ignore this
                    email</h2>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding: 0 30px 0px 30px;">
                <div style="border: 1px solid #ddd; border-radius: 8px; padding: 5px;">
                    <div style="font-size: 48px; text-align: center;">🔑</div>
                    <p style="font-size: 16px; color: #333; margin: 10px 0;">
                        Continue sign in by entering the code below:
                    </p>
                    <p style="font-size: 32px; font-weight: bold; margin: 20px 0;color:#a45454;">
                        {{otp}}
                    </p>
                    <p style="font-size: 12px; font-weight: bold; margin: 20px 0;color:red;">
                        ⚠️ “Do not share this code with anyone.”
                    </p>
                </div>
                <p style="font-size: 13px; color: #666; margin-top: 20px;">
                    No Copy Paste Option<br />
                </p>
            </td>
        </tr>
        <tr>
            <td align="center" style="font-size: 12px; color: #999; padding: 10px;">
                © 2025 Sitemonitor. All rights reserved.
            </td>
        </tr>
    </table>
</body>

</html>
